name: goalhub
description: "A premium Material 3 sports application for live scores and news."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  animations: ^2.0.11
  logger: ^2.0.2
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.2.2
  geolocator: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
